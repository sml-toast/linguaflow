<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="bubbleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#F1F5F9"/>
    </linearGradient>
    <linearGradient id="flowGradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="flowGradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="flowGradient3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
    <linearGradient id="dotGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="512" height="512" rx="112" fill="url(#bgGradient)"/>

  <!-- 装饰性光晕 -->
  <circle cx="120" cy="100" r="80" fill="#ffffff" fill-opacity="0.08"/>
  <circle cx="420" cy="380" r="100" fill="#ffffff" fill-opacity="0.06"/>

  <!-- 流动的线条（底部延伸） -->
  <g opacity="0.9">
    <!-- 第一条流线 - 蓝色 -->
    <path d="M120 380 Q 200 340, 256 360 T 392 340" 
          stroke="url(#flowGradient1)" 
          stroke-width="14" 
          stroke-linecap="round" 
          fill="none"/>
    
    <!-- 第二条流线 - 紫色 -->
    <path d="M140 410 Q 220 370, 280 390 T 400 370" 
          stroke="url(#flowGradient2)" 
          stroke-width="12" 
          stroke-linecap="round" 
          fill="none"/>
    
    <!-- 第三条流线 - 橙色 -->
    <path d="M100 430 Q 180 400, 240 410 T 380 400" 
          stroke="url(#flowGradient3)" 
          stroke-width="10" 
          stroke-linecap="round" 
          fill="none"/>
  </g>

  <!-- 对话气泡主体 -->
  <g filter="url(#shadow)">
    <!-- 气泡主体 -->
    <path d="M128 120 H 384 Q 408 120, 408 144 V 280 Q 408 304, 384 304 H 240 L 184 352 V 304 H 128 Q 104 304, 104 280 V 144 Q 104 120, 128 120 Z" 
          fill="url(#bubbleGradient)"/>
    
    <!-- 气泡高光 -->
    <path d="M128 120 H 384 Q 408 120, 408 144 V 170 Q 408 156, 394 148 L 380 144 H 132 Q 118 144, 108 152 L 104 156 V 144 Q 104 120, 128 120 Z" 
          fill="#ffffff" 
          fill-opacity="0.6"/>
  </g>

  <!-- 气泡内的三个流动圆点（代表对话/语言） -->
  <g>
    <circle cx="180" cy="212" r="18" fill="url(#dotGradient)"/>
    <circle cx="256" cy="212" r="18" fill="url(#flowGradient1)"/>
    <circle cx="332" cy="212" r="18" fill="url(#flowGradient3)"/>
  </g>

  <!-- 装饰性小圆环 -->
  <circle cx="400" cy="120" r="20" fill="#ffffff" fill-opacity="0.15"/>
  <circle cx="110" cy="320" r="14" fill="#ffffff" fill-opacity="0.12"/>
</svg>
