<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="dotGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="dotGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>
  
  <!-- 对话气泡简化为白色圆角形状 -->
  <path d="M14 16 H 50 Q 54 16, 54 20 V 36 Q 54 40, 50 40 H 32 L 26 46 V 40 H 14 Q 10 40, 10 36 V 20 Q 10 16, 14 16 Z" 
        fill="#ffffff" fill-opacity="0.95"/>
  
  <!-- 三个圆点（对话指示器） -->
  <circle cx="22" cy="28" r="3.5" fill="#3B82F6"/>
  <circle cx="32" cy="28" r="3.5" fill="#06B6D4"/>
  <circle cx="42" cy="28" r="3.5" fill="#F97316"/>
  
  <!-- 底部流动线条简化 -->
  <path d="M10 48 Q 20 44, 32 46 T 54 44" 
        stroke="#06B6D4" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M14 52 Q 24 48, 36 50 T 50 48" 
        stroke="#F97316" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>
